[build.environment]
  # The Firebase web apiKey must ship in the client bundle for the Firebase SDK
  # to work in the browser. It is public by design (it identifies the project,
  # it does not grant access — access is controlled by Firestore security rules).
  # Its value matches Netlify's secret-scanning heuristics, so this env var is
  # explicitly omitted from the scan. Set VITE_FIREBASE_API_KEY in the Netlify
  # UI under Site settings → Environment variables.
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY"
